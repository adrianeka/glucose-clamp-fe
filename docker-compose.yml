version: '3.8'
services:
  frontend-app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: glucoseclamp-frontend
    ports:
      - "3000:3000"
    networks:
      - glucose-network
    restart: always

networks:
  glucose-network:
    external: true