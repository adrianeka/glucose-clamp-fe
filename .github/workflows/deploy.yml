name: Deploy Frontend to VPS

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Mengirimkan variabel environment build-time Next.js jika dibutuhkan
          build-args: |
            NEXT_PUBLIC_API_URL=https://glucose-clamp-be.jiwamu.de/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/glucoseclamp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH and Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/glucose-clamp-fe
            git pull origin dev
            docker-compose pull
            docker-compose up -d
            docker image prune -f
